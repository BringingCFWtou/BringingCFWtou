<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BringingCFWtou</title>
<style>
  body { background:#1a1a1a; color:#ccc; font-family:"Courier New",monospace; text-align:center; padding-top:80px; }
  p { color:#666; font-size:11px; letter-spacing:2px; }
  a { color:#ff6600; }
</style>
</head>
<body>
<p>:: REDIRECTING ::</p>
<script type="text/javascript">
  (function() {
    var ua = navigator.userAgent.toLowerCase();
    var isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile|tablet|touch/i.test(ua);
    // Also check screen width as fallback
    if (isMobile || window.screen.width <= 800) {
      window.location.replace('mobile.html');
    } else {
      window.location.replace('desktop.html');
    }
  })();
</script>
<noscript>
  <p>JavaScript required for auto-redirect.<br>
  <a href="desktop.html">Desktop version</a> &nbsp;|&nbsp; <a href="mobile.html">Mobile version</a></p>
</noscript>
</body>
</html>
